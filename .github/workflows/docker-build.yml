
# Practical 3: Build Docker Image Using GitHub Actions
# Scenario

# Whenever code is pushed to the main branch:

# Checkout the repository
# Build the Docker image
# Tag it as myapp:latest
# Verify the image by listing Docker images
name: docker-build

on : 
  push : 
     branches:
        - main
jobs : 
    docker-build:
         runs-on: ubuntu-latest

         steps: 
            - name: checkout repository
              uses : actions/checkout@v4

            - name: build docker image
              run : docker build -t myapp:latest .
             
            - name: verify image
              run : docker image
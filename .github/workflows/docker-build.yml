name: docker-build

on : 
  push : 
     branches:
        - main
jobs : 
    docker-build:
         runs-on: ubuntu-latest

         steps: 
            - name: checkout repository
              uses : actions/checkout@v4

            - name: build docker image
              run : docker build -t myapp:latest .
             
            - name: verify image
              run : docker image